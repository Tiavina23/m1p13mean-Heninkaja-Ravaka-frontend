<div class="admin-wrapper">

  <h1>Admin Dashboard</h1>

  <!-- BOUTON POPUP SHOP VALIDATION -->
  <button (click)="openShopValidation()">
    🔔 Valider les shops ({{ pendingShopsCount }})
  </button>

  <!-- POPUP SHOP VALIDATION -->
  <div class="modal" [class.show]="isShopValidationOpen">
    <div class="modal-content">
      <span class="close" (click)="closeShopValidation()">&times;</span>
      <app-shop-validation></app-shop-validation>
    </div>
  </div>

  <hr>

  <h2>Liste des shops validés</h2>

  <div *ngIf="shops.length === 0">
    Aucun shop disponible
  </div>

  <div *ngFor="let shop of shops" class="shop-card">
    <p><strong>Nom :</strong> {{ shop.name }}</p>
    <p><strong>Propriétaire :</strong> {{ shop.owner?.name }}</p>
    <p><strong>Email :</strong> {{ shop.owner?.email }}</p>
  </div>

</div>
