<div class="login-wrapper">

  <div class="login-card">
    <div class="login-header">
      <span class="icon">🔑</span>
      <h2>Connexion</h2>
      <p>Accédez à votre espace gestion</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="votre@email.com"
        />
        <small class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Email invalide
        </small>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
        />
        <small class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Minimum 4 caractères
        </small>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>

    </form>

    <p class="error-msg" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <div class="register-link">
      <span>Pas de compte ?</span>
      <a routerLink="/register">S'inscrire ici</a>
    </div>
  </div>

</div>
