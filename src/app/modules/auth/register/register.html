<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <span class="icon">📝</span>
      <h2>Inscription</h2>
      <p>Créez votre compte pour commencer</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <!-- NOM -->
      <div class="form-group">
        <label>Nom complet</label>
        <input 
          type="text" 
          formControlName="name" 
          placeholder="Votre nom">
        <small class="error-text" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Le nom est obligatoire
        </small>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="exemple@mail.com">
        <small class="error-text" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Email invalide
        </small>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Mot de passe</label>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="••••••••">
        <small class="error-text" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Minimum 4 caractères
        </small>
      </div>

      <!-- ROLE -->
      <div class="form-group">
        <label>Vous êtes ?</label>
        <select formControlName="role" class="form-select">
          <option value="acheteur">Acheteur</option>
          <option value="shop">Propriétaire de Shop</option>
        </select>
      </div>

      <!-- CHAMPS SHOP (AFFICHÉ SEULEMENT SI ROLE = SHOP) -->
      <div *ngIf="registerForm.get('role')?.value === 'shop'" class="shop-fields-box">
        
        <div class="form-group">
          <label>Nom de votre boutique</label>
          <input 
            type="text" 
            formControlName="shopName" 
            placeholder="Nom du shop">
        </div>

        <div class="form-group">
          <label>Description</label>
          <input 
            type="text" 
            formControlName="shopDescription" 
            placeholder="Ce que vous vendez...">
        </div>

      </div>

      <!-- BUTTON -->
      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid">
        S'inscrire
      </button>

    </form>

    <!-- MESSAGE ERREUR -->
    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>

    <!-- MESSAGE SUCCÈS -->
    <div *ngIf="message" class="success-msg">
      {{ message }}
    </div>

    <!-- LINK LOGIN -->
    <div class="register-link">
      <p>Déjà un compte ? <a routerLink="/login">Se connecter ici</a></p>
    </div>

  </div>
</div>

<!-- FOOTER UNIQUE -->
<footer class="client-footer">
  <div class="footer-content">
    <p>© 2026 - Tous droits réservés</p>
    <div class="authors">
      <span class="author-name">RAMANANJATOVO Ravaka F.T</span>
      <span class="separator">&&</span>
      <span class="author-name">RAKOTOARIMAMY Mitantsoa H.</span>
    </div>
  </div>
</footer>
