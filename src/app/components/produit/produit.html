<div class="container">

  <div class="form-section">
    <h2>Gestion de produits </h2>

    <form (ngSubmit)="save()">

      <div class="form-group">
        <label>Nom</label>
        <input type="text" [(ngModel)]="produit.name" name="name" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="produit.description" name="description"></textarea>
      </div>

      <div class="form-group">
        <label>Prix (Ar)</label>
        <input type="number" [(ngModel)]="produit.prix" name="prix" required>
      </div>

      <div class="form-group">
        <label>Stock</label>
        <input type="number" [(ngModel)]="produit.stock" name="stock">
      </div>

      <div class="form-group">
        <label>Catégorie</label>
        <select [(ngModel)]="produit.categorie" name="categorie" required>
          <option *ngFor="let c of categories" [ngValue]="c._id">
            {{c.name}}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Image</label>
        <input type="file" (change)="onFileSelected($event)">
      </div>

      <button type="submit">
        {{isEdit ? 'Modifier' : 'Ajouter'}}
      </button>

    </form>
  </div>


  <div class="table-section">
    <h2>Liste des produits</h2>

    <table>
      <tr>
        <th>Nom</th>
        <th>Prix</th>
        <th>Stock</th>
        <th>Image</th>
        <th>Actions</th>
      </tr>

      <tr *ngFor="let p of produits">
        <td>{{p.name}}</td>
        <td>{{p.prix}} Ar</td>
        <td>{{p.stock}}</td>
        <td>
          <img 
            *ngIf="p.image"
            [src]="'http://localhost:5000/uploads/' + p.image"
            class="product-image">
        </td>
        <td>
          <button (click)="edit(p)">Edit</button>
          <button (click)="delete(p._id)">Delete</button>
        </td>
      </tr>
    </table>
  </div>

</div>
