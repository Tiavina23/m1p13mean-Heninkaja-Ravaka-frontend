<div class="login-container">

    <h2>Connexion</h2>
    <p>Veuillez cliquer sur votre rôle pour vous connecter :</p>
  
    <!-- Boutons rôle -->
    <div class="roles">
      <button type="button" (click)="selectRole('admin')">
        Admin
      </button>
  
      <button type="button" (click)="selectRole('shop')">
        Shop
      </button>

      <button type="button" (click)="selectRole('acheteur')">
        Acheteur
      </button>
    </div>
  
    <!-- Formulaire affiché seulement après sélection -->
    <form *ngIf="email" (ngSubmit)="login()">
  
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" readonly>
  
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" name="password" readonly>
  
      <button 
        (click)="login()" 
        [ngClass]="{'active-btn': isClicked}"
        (mousedown)="onClick()"
      >
        Se connecter
      </button>
  
    </form>
  
    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>
  
  </div>
